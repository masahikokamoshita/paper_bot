# =====================================================================
#  arXiv -> 要約 -> Discord / Slack（複数チャンネル振り分け）bot 設定
#  Slackは SLACK_CHANNEL_* を登録＋Bot招待したチャンネルだけに送信。
#  未登録トピックは自動スキップ（Discordのみ）。
# =====================================================================

defaults:
  categories:
    - quant-ph
  max_papers_per_run: 50

arxiv:
  max_results_per_query: 60
  lookback_hours: 96
  request_interval_sec: 3.0

scirate:
  enabled: true
  categories:
    - quant-ph
  min_scites: 0
  rank_by_scites: true

summary:
  enabled: true
  provider: "openai"
  model: "gpt-4o-mini"
  language: "ja"
  max_tokens: 500
  use_fulltext: true
  fulltext_max_chars: 20000

figure:
  enabled: true
  model: "gpt-4o-mini"
  min_scites: 20
  max_papers_per_run: 3
  explain_max_chars: 1000

slack:
  enabled: true
  bot_token_env: "SLACK_BOT_TOKEN"
  summary_in_thread: true

discord:
  username: "arXiv Bot"
  embeds_per_message: 8
  style: "compact"
  use_threads: true

topics:
  - name: "量子位相推定"
    webhook_env: "DISCORD_WEBHOOK_QPE"
    slack_channel_env: "SLACK_CHANNEL_QPE"
    keywords:
      - "quantum phase estimation"
      - "iterative phase estimation"
      - "statistical phase estimation"
      - "Bayesian phase estimation"
      - "robust phase estimation"

  - name: "量子特異値変換"
    webhook_env: "DISCORD_WEBHOOK_QSVT"
    slack_channel_env: "SLACK_CHANNEL_QSVT"
    keywords:
      - "quantum singular value transformation"
      - "quantum signal processing"
      - "qubitization"
      - "block encoding"
      - "quantum eigenvalue transformation"

  - name: "ハミルトニアンシミュレーション"
    webhook_env: "DISCORD_WEBHOOK_HAMILTONIAN_SIMULATION"
    slack_channel_env: "SLACK_CHANNEL_HAMILTONIAN_SIMULATION"
    keywords:
      - "Hamiltonian simulation"
      - "quantum simulation algorithm"
      - "Trotterization"
      - "Suzuki-Trotter"
      - "product formula"

  - name: "QSCI(SQD)"
    webhook_env: "DISCORD_WEBHOOK_QSCI"
    slack_channel_env: "SLACK_CHANNEL_QSCI"
    keywords:
      - "quantum-selected configuration interaction"
      - "QSCI"
      - "sample-based quantum diagonalization"
      - "quantum subspace diagonalization"

  - name: "量子化学計算全般"
    webhook_env: "DISCORD_WEBHOOK_QCHEM"
    slack_channel_env: "SLACK_CHANNEL_QCHEM"
    categories:
      - quant-ph
      - physics.chem-ph
    keywords:
      - "quantum chemistry"
      - "electronic structure"
      - "variational quantum eigensolver"
      - "ground state energy"
      - "molecular simulation"

  - name: "素因数分解"
    webhook_env: "DISCORD_WEBHOOK_RSA"
    slack_channel_env: "SLACK_CHANNEL_RSA"
    keywords:
      - "Shor's algorithm"
      - "quantum factoring"
      - "integer factorization"
      - "integer factorization"
      - "discrete logarithm"

  - name: "光量子コンピュータ"
    webhook_env: "DISCORD_WEBHOOK_PHOTONIC"
    slack_channel_env: "SLACK_CHANNEL_PHOTONIC"
    keywords:
      - "photonic quantum computing"
      - "linear optical quantum"
      - "boson sampling"
      - "continuous variable quantum"
      - "measurement-based quantum computing"

  - name: "量子機械学習"
    webhook_env: "DISCORD_WEBHOOK_QML"
    slack_channel_env: "SLACK_CHANNEL_QML"
    keywords:
      - "quantum machine learning"
      - "quantum neural network"
      - "quantum kernel"
      - "variational quantum classifier"
      - "parameterized quantum circuit"

  - name: "実機"
    webhook_env: "DISCORD_WEBHOOK_HARDWARE"
    slack_channel_env: "SLACK_CHANNEL_HARDWARE"
    keywords:
      - "superconducting qubit"
      - "trapped-ion quantum"
      - "neutral atom array"
      - "quantum processor"
      - "logical qubit experiment"

  - name: "誤り訂正・magic state"
    webhook_env: "DISCORD_WEBHOOK_QEC"
    slack_channel_env: "SLACK_CHANNEL_QEC"
    keywords:
      - "quantum error correction"
      - "magic state"
      - "magic state cultivation"
      - "fault-tolerant quantum computation"
      - "surface code"

  - name: "qLDPC符号"
    webhook_env: "DISCORD_WEBHOOK_QLDPC"
    slack_channel_env: "SLACK_CHANNEL_QLDPC"
    keywords:
      - "quantum LDPC"
      - "qLDPC"
      - "low-density parity-check code"
      - "good quantum code"
      - "high-rate quantum code"

  - name: "散乱理論"
    webhook_env: "DISCORD_WEBHOOK_SCATTERING"
    slack_channel_env: "SLACK_CHANNEL_SCATTERING"
    categories:
      - quant-ph
      - hep-lat
      - hep-th
      - nucl-th
      - physics.atom-ph      # 電子–原子/分子散乱
      - physics.chem-ph      # 分子の反応散乱
      - cond-mat.mes-hall    # 固体中の電子散乱・輸送
    keywords:
      - "scattering amplitude"
      - "S-matrix"
      - "electron scattering"
      - "molecular scattering"
      - "cross section"
      - "quantum simulation of scattering"

  - name: "Berry位相"
    webhook_env: "DISCORD_WEBHOOK_BERRY_PHASE"
    slack_channel_env: "SLACK_CHANNEL_BERRY_PHASE"
    keywords:
      - "Berry phase"
      - "geometric phase"
      - "Berry curvature"
      - "holonomic quantum computation"
      - "adiabatic phase"
