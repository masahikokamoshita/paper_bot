# =====================================================================
#  arXiv -> 要約 -> Discord bot 設定ファイル
#  ここを編集するだけで監視対象や挙動を変えられます。
# =====================================================================

# --- 監視対象 -------------------------------------------------------
watch:
  # キーワード（フレーズはそのまま入れてOK。複数指定すると OR 検索）
  keywords:
    - "large language model"
    - "diffusion model"
    - "retrieval augmented generation"

  # 著者名（フルネーム推奨。複数可。各著者ごとに検索します）
  authors:
    - "Yoshua Bengio"

  # arXiv の分野で絞り込む（任意。空にすると全分野）
  # 例: cs.LG(機械学習) cs.CL(自然言語) cs.CV(画像) stat.ML quant-ph など
  categories:
    - cs.LG
    - cs.CL

# --- arXiv 取得の挙動 ----------------------------------------------
arxiv:
  max_results_per_query: 40   # 1クエリあたりの取得上限
  lookback_hours: 30          # 「新着」とみなす投稿の範囲（cron間隔より少し長めが安全）
  request_interval_sec: 3.0   # arXiv への礼儀（連続アクセスの間隔）

# --- Scirate（注目度=scite数）-------------------------------------
#  ※Scirateに公式APIは無いため、カテゴリページを取得してscite数を付与します。
#    取得に失敗しても bot は arXiv 単体で正常に動きます（自動でスキップ）。
scirate:
  enabled: true
  categories:                 # scite数を見るカテゴリ
    - cs.LG
    - cs.CL
  min_scites: 0               # この数未満のsciteしか付いていない論文は除外（0で無効）
  rank_by_scites: true        # scite数が多い順に並べて送る
  add_trending: false         # キーワードに合致しなくても、scite上位の話題作を拾う
  trending_top_n: 5           # add_trending時、各カテゴリから拾う上位件数

# --- 要約（Claude API）--------------------------------------------
summary:
  model: "claude-sonnet-4-6"  # 安く回すなら "claude-haiku-4-5-20251001"
  language: "ja"              # 要約の言語
  max_tokens: 500             # 要約の最大トークン
  max_papers_per_run: 10      # 1回の実行で要約・送信する最大件数（コスト/レート対策）

# --- Discord --------------------------------------------------------
discord:
  username: "arXiv Bot"       # Webhook表示名
  embeds_per_message: 8       # 1メッセージあたりの埋め込み数（Discord上限は10）
