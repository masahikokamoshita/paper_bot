name: arXiv Discord Bot

on:
  schedule:
    # UTC基準。'0 0 * * *' = 毎日 09:00 JST。
    - cron: '0 0 * * *'
  workflow_dispatch: {}   # 手動実行も可能

permissions:
  contents: write          # seen.json を push するために必要

concurrency:
  group: arxiv-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          # 要約あり(summary.enabled: true)の場合のみ必要
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 各チャンネルのWebhook（config.yaml の webhook_env と名前を一致させる）
          DISCORD_WEBHOOK_QPE:      ${{ secrets.DISCORD_WEBHOOK_QPE }}
          DISCORD_WEBHOOK_QSVT:     ${{ secrets.DISCORD_WEBHOOK_QSVT }}
          DISCORD_WEBHOOK_TROTTER:  ${{ secrets.DISCORD_WEBHOOK_TROTTER }}
          DISCORD_WEBHOOK_QSCI:     ${{ secrets.DISCORD_WEBHOOK_QSCI }}
          DISCORD_WEBHOOK_QCHEM:    ${{ secrets.DISCORD_WEBHOOK_QCHEM }}
          DISCORD_WEBHOOK_RSA:      ${{ secrets.DISCORD_WEBHOOK_RSA }}
          DISCORD_WEBHOOK_PHOTONIC: ${{ secrets.DISCORD_WEBHOOK_PHOTONIC }}
          DISCORD_WEBHOOK_QML:      ${{ secrets.DISCORD_WEBHOOK_QML }}
          DISCORD_WEBHOOK_HARDWARE: ${{ secrets.DISCORD_WEBHOOK_HARDWARE }}
          DISCORD_WEBHOOK_QEC:        ${{ secrets.DISCORD_WEBHOOK_QEC }}
          DISCORD_WEBHOOK_QLDPC:      ${{ secrets.DISCORD_WEBHOOK_QLDPC }}
          DISCORD_WEBHOOK_SCATTERING: ${{ secrets.DISCORD_WEBHOOK_SCATTERING }}
        run: python -m src.main

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "Update seen state [skip ci]"
            git push
          fi
