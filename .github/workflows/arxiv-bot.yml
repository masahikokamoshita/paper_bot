name: arXiv Discord Bot

on:
  schedule:
    - cron: '36 0 * * *'    # 10:36 JST（本命）
    - cron: '36 1 * * *'    # 10:36 JST（保険）
    - cron: '36 7 * * *'    # 16:36 JST（保険）
    - cron: '36 13 * * *'   # 22:36 JST（保険）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: arxiv-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_WEBHOOK_QPE:                    ${{ secrets.DISCORD_WEBHOOK_QPE }}
          DISCORD_WEBHOOK_QSVT:                   ${{ secrets.DISCORD_WEBHOOK_QSVT }}
          DISCORD_WEBHOOK_HAMILTONIAN_SIMULATION: ${{ secrets.DISCORD_WEBHOOK_HAMILTONIAN_SIMULATION }}
          DISCORD_WEBHOOK_QSCI:                   ${{ secrets.DISCORD_WEBHOOK_QSCI }}
          DISCORD_WEBHOOK_QCHEM:                  ${{ secrets.DISCORD_WEBHOOK_QCHEM }}
          DISCORD_WEBHOOK_RSA:                    ${{ secrets.DISCORD_WEBHOOK_RSA }}
          DISCORD_WEBHOOK_PHOTONIC:               ${{ secrets.DISCORD_WEBHOOK_PHOTONIC }}
          DISCORD_WEBHOOK_QML:                    ${{ secrets.DISCORD_WEBHOOK_QML }}
          DISCORD_WEBHOOK_HARDWARE:               ${{ secrets.DISCORD_WEBHOOK_HARDWARE }}
          DISCORD_WEBHOOK_QEC:                    ${{ secrets.DISCORD_WEBHOOK_QEC }}
          DISCORD_WEBHOOK_QLDPC:                  ${{ secrets.DISCORD_WEBHOOK_QLDPC }}
          DISCORD_WEBHOOK_SCATTERING:             ${{ secrets.DISCORD_WEBHOOK_SCATTERING }}
          DISCORD_WEBHOOK_BERRY_PHASE:            ${{ secrets.DISCORD_WEBHOOK_BERRY_PHASE }}
          SLACK_CHANNEL_QPE:                    ${{ secrets.SLACK_CHANNEL_QPE }}
          SLACK_CHANNEL_QSVT:                   ${{ secrets.SLACK_CHANNEL_QSVT }}
          SLACK_CHANNEL_HAMILTONIAN_SIMULATION: ${{ secrets.SLACK_CHANNEL_HAMILTONIAN_SIMULATION }}
          SLACK_CHANNEL_QSCI:                   ${{ secrets.SLACK_CHANNEL_QSCI }}
          SLACK_CHANNEL_QCHEM:                  ${{ secrets.SLACK_CHANNEL_QCHEM }}
          SLACK_CHANNEL_RSA:                    ${{ secrets.SLACK_CHANNEL_RSA }}
          SLACK_CHANNEL_PHOTONIC:               ${{ secrets.SLACK_CHANNEL_PHOTONIC }}
          SLACK_CHANNEL_QML:                    ${{ secrets.SLACK_CHANNEL_QML }}
          SLACK_CHANNEL_HARDWARE:               ${{ secrets.SLACK_CHANNEL_HARDWARE }}
          SLACK_CHANNEL_QEC:                    ${{ secrets.SLACK_CHANNEL_QEC }}
          SLACK_CHANNEL_QLDPC:                  ${{ secrets.SLACK_CHANNEL_QLDPC }}
          SLACK_CHANNEL_SCATTERING:             ${{ secrets.SLACK_CHANNEL_SCATTERING }}
          SLACK_CHANNEL_BERRY_PHASE:            ${{ secrets.SLACK_CHANNEL_BERRY_PHASE }}
        run: python -m src.main

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "Update state [skip ci]"
            git push
          fi
